name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - feature/**
  pull_request:

jobs:
  Build-Lint-Test:
    runs-on: ubuntu-latest
    name: Node Backend + Web (TypeScript)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile || pnpm --dir web install

      - name: Lint
        run: pnpm lint

      - name: Type-check backend
        run: pnpm typecheck

      - name: Type-check frontend
        run: pnpm web:typecheck

      - name: Build backend
        run: pnpm build

      - name: Build frontend
        run: pnpm web:build

  audio-analysis-service:
    runs-on: ubuntu-latest
    name: Python Audio Analysis Service
    defaults:
      run:
        working-directory: audio-analysis-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: audio-analysis-service/requirements.txt

      - name: Install system audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Run tests
        run: pytest -v
